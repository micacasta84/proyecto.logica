<!DOCTYPE html> 
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Parcial</title>
    

</head>
<body>
    <script>
      // Armen un sistema que calcule el monto que hay que pagarle a un empleado de una empresa de seguros cada mes.

//Pídanle al usuario que ingrese los siguientes datos: nombre del empleado, apellido del empleado, los años de antigüedad en la empresa, la cantidad de días trabajados en el mes y la cantidad de seguros vendidos.

//Calculen el sueldo total del empleado, teniendo en cuenta las siguientes condiciones:
 
//•    Si un empleado tiene menos de 3 años de antigüedad en la empresa cobra $500.000 mensuales.
//•    Si un empleado tiene 3 o más años de antigüedad en la empresa cobra $700.000 mensuales.
//•    Si un empleado tiene 5 años o más de antigüedad en la empresa cobra $800.000 mensuales.
//•    Si el empleado trabajo más de 20 días en el mes, recibirá un bono de presentismo de $100.000.
//•    Si el empleado vendió mas de 30 seguros en el mes, recibirá un bono de ventas de $80.000.
//•    Si el empleado alcanzo las metas del bono de presentismo y el bono de ventas, recibirá un bono adicional de $45.000.

//Verifiquen que el valor de la cantidad de días trabajados no supere los 31 días. (Para el propósito de este ejercicio, todos los meses están compuestos de 31 días.)

//Devuélvanle al usuario la información mediante un alert() o document.write() e incluyan todos los factores que influyeron el resultado: 

//El nombre completo del empleado.
//Su antigüedad.
//La cantidad de seguros vendidos.
//Todos los bonos para los que califica y el valor de los mismos.
//El total de su sueldo.

     var nombre = prompt("Ingrese el nombre del empleado:");
     var apellido = prompt("Ingrese el apellido del empleado:");

     if (nombre === "" || apellido === "" || !isNaN(nombre) || !isNaN(apellido)) {
        alert("error: el nombre y el apellido no pueden estar vacíos ni contener números. Recargue la pagina e intente de nuevo.");
     // Si el nombre o el apellido son invalidos, se muestra un mensaje de error y se detiene la ejecución del programa.
     } else { 
        // Si el nombre y el apellido son validos, se continua con el siguiente dato.
        var antiguedad = parseInt(prompt("Ingrese los años de antigüedad en la empresa:"));

     if (isNaN(antiguedad) || antiguedad < 0) {
        // Mensaje de error, antiguedad invalida.
        alert("Error: La antigüedad debe ser un número válido, mayor o igual a cero. Recargue e intente de nuevo.");
        //si falla queda aca.
     } else {
        // Camino feliz, continuamos con el siguiente dato.
        var diasTrabajados = parseInt(prompt("Ingrese la cantidad de días trabajados en el mes:"));
     
        if (isNaN(diasTrabajados) || diasTrabajados <=0 || diasTrabajados>31) {
            // Mensaje de error, dias trabajados invalidos.
            alert("Error: La cantidad de días trabajados debe ser un número válido. Recargue e intente de nuevo.");
            // dato invalido, recarga la pagina.
        } else {
            // si el dato anterior es valido, se sigue con el siguiente dato.
            var segurosVendidos = parseInt(prompt("Ingrese la cantidad de seguros vendidos en el mes:"));
        


        if (isNaN(segurosVendidos) || segurosVendidos <0 || segurosVendidos === "") {
            // mensaje de error, cantidad de seguros vendidos invalida.
            alert("Error: La cantidad de seguros vendidos debe ser mayor o igual a cero. Recargue e intente de nuevo.");

        } else {
        //Si llegamos aca es porque los datos son validos 
        var sueldoBase= (antiguedad < 3 && antiguedad >=0) ? 500000 : (antiguedad >= 3 && antiguedad < 5)? 700000 : 800000; 
    //•    Si un empleado tiene menos de 3 años de antigüedad en la empresa cobra $500.000 mensuales.
    //•    Si un empleado tiene 3 o más años de antigüedad en la empresa cobra $700.000 mensuales.
    //•    Si un empleado tiene 5 años o más de antigüedad en la empresa cobra $800.000 mensuales.
       
  

       var bonoPresentismo = (diasTrabajados > 20 && diasTrabajados <=31) ? 100000 : 0;
//•    Si el empleado trabajo más de 20 días en el mes, recibirá un bono de presentismo de $100.000.
       

       var bonoVentas = (segurosVendidos > 30) ? 80000 : 0;
//•    Si el empleado vendió mas de 30 seguros en el mes, recibirá un bono de ventas de $80.000.
      

       var bonoAdicional = (bonoPresentismo > 0 && bonoVentas > 0) ? 45000 : 0;
//•    Si el empleado alcanzo las metas del bono de presentismo y el bono de ventas, recibirá un bono adicional de $45.000.
        

         var sueldoTotal = sueldoBase + bonoPresentismo + bonoVentas + bonoAdicional;
         var bonoTotal = bonoPresentismo + bonoVentas + bonoAdicional;
      
    
         document.write ("<h1>Resultado del cálculo del sueldo</h1>");
         document.write("<h2>Nombre completo del empleado: " + nombre + " " + apellido + "</h2>");
         document.write("<h3> Información detallada:</h3>");
         document.write ("<ul>");
         document.write("<li>Años de antigüedad: " + antiguedad + "</li>");
         document.write("<li>Cantidad de seguros vendidos: " + segurosVendidos + "</li>");
         document.write("<li>Bonos obtenidos: $" + bonoTotal + "</li>");
         document.write("<li>Bono de presentismo: $" + bonoPresentismo + "</li>");
         document.write("</ul")
        
      

       
         if (bonoPresentismo > 0) {
            document.write("<p>¡Felicidades! has obtenido el bono de presentismo</p>")
         } else {
            document.write("<p>¡Suerte el proximo mes, sabemos que puedes lograrlo!</p>");
         }
        
         document.write("<li>Bono de ventas: $" + bonoVentas + "</li>");
         
         if (bonoVentas > 0) {
         document.write ("<p>¡Felicidades! has obtenido el bono de ventas</p>")
        } else {
          document.write("<p>¡Creemos en tu potencial!</p>");
         }

         document.write("<li>Bono adicional: $" + bonoAdicional + "</li>");
          if (bonoAdicional > 0) {
            document.write("<p>¡Felicidades! has obtenido el bono adicional por cumplir con las metas de presentismo y ventas</p>");
         } else {
            document.write("<p>¡Suerte el proximo mes, sabemos que puedes lograrlo!</p>");
         }

         document.write("</ul>");
         document.write("<h2>Sueldo total a pagar: $" + sueldoTotal + "</h2>");

      }
   }
}
     }
    
        
        </script>
</body>
</html>
